name: Deploy sample report
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: enable corepack (yarn for report-ui build)
        run: corepack enable
      - name: build report-ui (report.js + style.css)
        run: sh ./scripts/build-ui.sh v0.5.0
      - name: install
        run: pnpm install --frozen-lockfile
      - name: build (dist + bundle reg.wasm)
        run: pnpm build
      - name: generate sample report
        run: |
          mkdir -p public
          cp -r sample/actual sample/expected sample/diff public/
          node dist/cli.mjs ./sample/actual ./sample/expected ./sample/diff \
            -R public/index.html -X client
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
