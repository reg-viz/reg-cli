name: CI
on: [push, pull_request]
permissions:
  contents: read
  pull-requests: write

jobs:
  # Wasm pipeline (the only pipeline now that the legacy JS impl is gone):
  # uses the committed js/reg.wasm so we don't pay the wasi-sdk toolchain
  # cost on every PR. Rust unit tests (`cargo test`) and the JS CLI/library
  # integration tests (`node:test` via `pnpm test` in `js/`) both run here
  # and cover junit/reg.json schema compat, -F/-X/-E, and the `compare()`
  # EventEmitter surface (reg-suit drop-in).
  # Matrix runs on Linux + macOS + Windows. Windows depends on the
  # @tybys/wasm-util 0.10.x uvwasi sync — earlier 0.9.x failed
  # `path_open` on Windows preopens with EINVAL.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      # Linux: job-scoped sakimori (v0.34+). Starts an eBPF daemon
      # attached to the runner worker's cgroup BEFORE checkout, so
      # every subsequent step in this matrix entry (checkout,
      # setup-{node,rust}, the build/test script, the comment
      # sub-action) is observed by a single supervisor. Replaces the
      # earlier one-step form `bokuweb/sakimori@v0` with `run:`,
      # which only supervised the wrapped command. macOS/Windows
      # skip this — the wrapper is Linux-only; Windows still uses
      # the single-step composite below.
      - if: runner.os == 'Linux'
        uses: bokuweb/sakimori/job@v0
        with:
          policy: .github/sakimori.yml
          mode: block
          log: sakimori.log.json
          html: sakimori-report.html

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # Skip on Windows: image-diff-rs's host-native build pulls in
      # libwebp's SSE4.1 intrinsics (`VP8LDspInitSSE41`), which the MSVC
      # linker can't resolve. The published artefact (reg.wasm) is
      # built with wasi-sdk's clang and is OS-independent.
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        if: runner.os != 'Windows'
        with:
          toolchain: stable

      # macOS unsupervised + Linux supervised by the job-scoped
      # daemon above. Same script body; the supervision is
      # transparent (no wrapping needed on Linux now).
      - name: full CI script
        if: runner.os != 'Windows'
        run: |
          set -euxo pipefail
          # macOS-15 runners ship a `/opt/homebrew/bin/cargo` that is actually
          # a `rustup-init` shim, and brew's bin dir precedes `~/.cargo/bin`
          # in PATH. `actions-rust-lang/setup-rust-toolchain` installs the
          # real cargo under `~/.cargo/bin` but only appends to PATH, so by
          # the time `cargo test` runs the shim wins and exits with
          # `unexpected argument 'test'`. Prepend so the rustup-managed
          # cargo is found first.
          export PATH="$HOME/.cargo/bin:$PATH"
          corepack enable
          sh ./scripts/build-ui.sh v0.5.0
          cargo test -p reg_core --lib
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test

      # Windows: keep the explicit one-step form. The job-scoped
      # wrapper is Linux only (cgroup v2 is the attach surface).
      # `--mode audit` override stays because sakimori-win itself
      # warns that `network.default=deny` is audit-only — Windows
      # Defender Firewall has no clean default-outbound-deny
      # primitive, so sakimori-win tags every TLS connect as
      # `denied` in the log without actually blocking it; in
      # `--mode block` the resulting `denied > 0` makes the run
      # exit non-zero on tests that were never blocked.
      - uses: bokuweb/sakimori@v0
        if: runner.os == 'Windows'
        with:
          policy: .github/sakimori.yml
          mode: block
      - name: full CI script — Windows, sakimori audit
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & $env:SAKIMORI_BIN `
            --policy $env:SAKIMORI_POLICY `
            --mode   audit `
            --log    sakimori.log.json `
            --html   sakimori-report.html `
            -- bash -euxo pipefail -c "corepack enable && sh ./scripts/build-ui.sh v0.5.0 && pnpm install --frozen-lockfile && pnpm build && pnpm test"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Flush the Linux daemon so upload-artifact + the comment
      # sub-action below see the freshly-written log + HTML. The
      # daemon's own post-hook would otherwise write them at
      # end-of-job, too late for an in-job upload. Sub-action is
      # idempotent and a no-op on non-Linux entries.
      - if: always()
        uses: bokuweb/sakimori/job/stop@v0

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always() && runner.os != 'macOS'
        with:
          name: sakimori-report-${{ matrix.os }}
          path: |
            sakimori-report.html
            sakimori.log.json
          if-no-files-found: ignore

      - uses: bokuweb/sakimori/comment@v0
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        with:
          log: sakimori.log.json
          artifact-name: sakimori-report-${{ matrix.os }}
          html-filename: sakimori-report.html
