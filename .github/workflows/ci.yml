name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: install
        run: pnpm install --frozen-lockfile
      - name: flow
        run: pnpm run flow
      - name: test
        run: pnpm run test

  # Wasm wrapper: uses the committed js/reg.wasm so we don't pay the
  # wasi-sdk toolchain cost on every PR. Rust unit tests (`cargo test`) and
  # the JS CLI/library integration tests (`node:test` via `pnpm test` in
  # `js/`) both run here and cover junit/reg.json schema compat, -F/-X/-E,
  # and the `compare()` EventEmitter surface.
  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: cargo test (reg_core)
        run: cargo test -p reg_core --lib
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: js install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: js build (dist + bundle reg.wasm)
        working-directory: js
        run: pnpm build
      - name: js test (CLI + library)
        working-directory: js
        run: pnpm test
