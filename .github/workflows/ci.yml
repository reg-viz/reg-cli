name: CI
on: [push, pull_request]
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
      - name: corepack enable
        run: corepack enable
      - name: corepack prepare pnpm
        run: corepack prepare pnpm@10.14.0 --activate
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: install chrome for puppeteer
        run: pnpm exec puppeteer browsers install chrome
      - name: flow
        run: pnpm run flow
      - name: test
        run: pnpm run test

  # Wasm wrapper: uses the committed js/reg.wasm so we don't pay the
  # wasi-sdk toolchain cost on every PR. Rust unit tests (`cargo test`) and
  # the JS CLI/library integration tests (`node:test` via `pnpm test` in
  # `js/`) both run here and cover junit/reg.json schema compat, -F/-X/-E,
  # and the `compare()` EventEmitter surface.
  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # No `version:` here — pnpm/action-setup defers to root
      # package.json's `packageManager` field (the post-merge value
      # 10.33.2). Specifying both triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      # `reg_core` embeds `report/ui/dist/{report.js,style.css}` via
      # `include_str!`, so `cargo test` fails before we even compile unless
      # we materialise them first. The root `build:report` script clones
      # `reg-viz/reg-cli-report-ui` at a pinned tag and builds it with
      # yarn (enabled via corepack in setup-node).
      - name: enable corepack (yarn for report-ui build)
        run: corepack enable
      - name: build report-ui (report.js + style.css)
        run: sh ./scripts/build-ui.sh v0.3.0
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
        with:
          toolchain: stable
      - name: cargo test (reg_core)
        run: cargo test -p reg_core --lib
      - name: js install
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: js build (dist + bundle reg.wasm)
        working-directory: js
        run: pnpm build
      - name: js test (CLI + library)
        working-directory: js
        run: pnpm test
